name: moonfin
description: "Moonfin — Jellyfin & Emby media client for mobile, TV, and desktop"
publish_to: 'none'
version: 0.1.0+200

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^15.1.2

  # State Management & DI
  get_it: ^8.0.3
  injectable: ^2.5.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  web_socket_channel: ^3.0.2

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.30

  # Media Playback
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Image Loading
  cached_network_image: ^3.4.1

  # Crypto
  crypto: ^3.0.6

  # Connectivity
  connectivity_plus: ^6.1.0

  # Notifications
  flutter_local_notifications: ^19.0.0
  audio_service: ^0.18.15
  audio_session: ^0.2.2

  # Utilities
  device_info_plus: ^11.2.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  intl: ^0.20.2
  collection: ^1.19.1
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

  # Local packages
  server_core:
    path: packages/server_core
  server_jellyfin:
    path: packages/server_jellyfin
  server_emby:
    path: packages/server_emby
  playback_core:
    path: packages/playback_core
  playback_jellyfin:
    path: packages/playback_jellyfin
  playback_emby:
    path: packages/playback_emby
  jellyfin_design:
    path: packages/design
  jellyfin_preference:
    path: packages/preference
  url_launcher: ^6.3.2
  file_picker: ^8.1.7
  webview_flutter: ^4.10.0
  pdfrx: ^1.0.0
  flutter_widget_from_html_core: ^0.16.0
  archive: ^3.6.1
  rar: ^0.3.0
  archive_extract:
    path: packages/archive_extract

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  mocktail: ^1.0.4
  msix: ^3.16.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/ratings/

msix_config:
  display_name: Moonfin
  publisher_display_name: Moonfin
  identity_name: com.moonfin.app
  msix_version: 0.1.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient, internetClientServer
  languages: en-us
